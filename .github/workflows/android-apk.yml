name: Android CI - Build APK

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Grant execute permission for Gradle cache scripts
        run: chmod -R +x "$HOME/.gradle" || true

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Build release APK (unsigned)
        run: gradle :app:assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nebula-force-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: nebula-force-release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
